<html>
</head>
<style>
    p {width:auto; float:left;margin:5px;padding:5px;border:1px solid grey}
    div{clear:both;height:40px}
    b{float:left}
</style>
</head>
<body>
    <h1>Bucket Sort</h1>
    <section></section>
    <main></main>
</body>

<script>
    let N=30;
    let M=10;
    let s=document.querySelector("section");
    let m=document.querySelector("main");
    for(let i=0;i<N;i++)
        s.innerHTML+="<p>"+Math.floor(Math.random()*100)/100+"</p>";
    for(let i=0;i<M;i++)
        m.innerHTML+="<div><b>"+i+": </b></div>";
    let p=document.querySelectorAll("p");
    let div=document.querySelectorAll("div");

function *bucket_sort()
{   for(let x of p)
    {
        yield;
        div[Math.floor(x.innerHTML*M)].append(x);
    }
    for(let x of div)
    {
        for(let y of x.querySelectorAll("p"))
        {   
            yield 1;
            s.append(y);
        }
    }
    p=document.querySelectorAll("p");
    yield* isort();

}

function* isort()
{
    for(let i=1;i<N;i++)
    {   
        p[i-1].style.background="lightgreen";
        p[i].style.background="yellow";
        if(p[i].previousSibling)
            p[i].previousSibling.style.background="yellow";
        yield 1;
        let moved=false; 
        while(p[i].previousSibling && +p[i].previousSibling.innerHTML>+p[i].innerHTML)
        {   
            p[i].previousSibling.style.background="red";
            p[i].previousSibling.before(p[i]);
            if(p[i].previousSibling)
                p[i].previousSibling.style.background="yellow";
            yield 1;
            p[i].nextSibling.style.background="lightgreen";
            if(p[i].previousSibling)
                p[i].previousSibling.style.background="yellow";
            moved=true;
        }
        if(moved)
        {
            p[i].style.background="red";
            yield 1;
        }
        p[i].style.background="lightgreen";
        if(p[i].previousSibling)
            p[i].previousSibling.style.background="lightgreen";
    }
}

let a=bucket_sort();

let x=setInterval(()=>{if(a.next().done) clearInterval(x)},500);

</script>
</html>
